{% extends "auth_layout.html" %}

{% block title %}Create Account - EventRadar{% endblock %}

{% block content %}
<h2>Create Account</h2>
<p class="text-muted" style="margin-bottom: 2rem;">Join the college event monitoring system</p>

<form method="POST" action="/register" class="auth-form">
    <div class="form-group">
        <label for="name">Full Name</label>
        <input type="text" id="name" name="name" placeholder="user name" required>
    </div>

    <div class="form-group">
        <label for="email">Email Address</label>
        <input type="email" id="email" name="email" placeholder="email" required>
    </div>

    <div class="form-group">
        <label for="role">I am a...</label>
        <select id="role" name="role">
            <option value="student">Student</option>
            <option value="admin">Administrator (requires approval)</option>
        </select>
    </div>

    <div class="form-group">
        <label for="password">Password</label>
        <input type="password" id="password" name="password" placeholder="••••••••" required>
    </div>

    <div class="form-group">
        <label for="confirm_password">Confirm Password</label>
        <input type="password" id="confirm_password" name="confirm_password" placeholder="••••••••" required>
    </div>

    <button type="submit" class="btn btn-primary" style="width: 100%; margin-top: 1rem;">Register</button>
</form>

<div class="auth-footer">
    Already have an account? <a href="/login">Sign in</a>
</div>
{% endblock %}
