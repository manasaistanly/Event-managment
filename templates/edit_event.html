{% extends "layout.html" %}

{% block title %}Edit Event - EventRadar{% endblock %}

{% block content %}
<div class="dashboard-header animate-slide-in">
    <h1>Edit Event</h1>
    <p class="text-muted">Update the details for "{{ event[1] }}".</p>
</div>

<div class="card animate-slide-in" style="margin-top: 2rem; max-width: 800px;">
    <form action="/update/{{ event[0] }}" method="POST" class="event-form">
        <div class="form-grid">
            <div class="form-group full-width">
                <label for="name">Event Name</label>
                <input type="text" id="name" name="name" value="{{ event[1] }}" required>
            </div>
            
            <div class="form-group">
                <label for="date">Date</label>
                <input type="date" id="date" name="date" value="{{ event[2] }}" required>
            </div>
            
            <div class="form-group">
                <label for="time">Time</label>
                <input type="time" id="time" name="time" value="{{ event[3] }}">
            </div>

            <div class="form-group">
                <label for="location">Location</label>
                <input type="text" id="location" name="location" value="{{ event[4] }}" required>
            </div>

            <div class="form-group">
                <label for="category">Category</label>
                <input type="text" id="category" name="category" list="category-list" value="{{ event[6] }}">
                <datalist id="category-list">
                    {% for cat in categories %}
                    <option value="{{ cat }}">
                    {% endfor %}
                </datalist>
            </div>

            <div class="form-group">
                <label for="organizer">Organizer</label>
                <input type="text" id="organizer" name="organizer" value="{{ event[7] or '' }}">
            </div>

            <div class="form-group">
                <label for="max_attendees">Max Attendees</label>
                <input type="number" id="max_attendees" name="max_attendees" value="{{ event[8] }}" min="0">
            </div>

            <div class="form-group full-width">
                <label for="description">Description</label>
                <textarea id="description" name="description" rows="5">{{ event[5] }}</textarea>
            </div>
        </div>

        <div class="form-actions" style="margin-top: 2rem;">
            <button type="submit" class="btn btn-primary">Update Event</button>
            <a href="/dashboard" class="btn btn-outline">Cancel</a>
        </div>
    </form>
</div>

<style>
    .card { background: var(--card-bg); padding: 2rem; border-radius: 20px; box-shadow: var(--shadow); }
    .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 1.5rem; }
    .full-width { grid-column: span 2; }
    .form-group label { display: block; font-weight: 600; margin-bottom: 0.5rem; font-size: 0.9rem; }
    .form-group input, .form-group textarea, .form-group select {
        width: 100%; padding: 0.85rem 1.25rem; border: 1px solid var(--border-color);
        border-radius: 12px; background: var(--bg-main); color: var(--text-main); font-size: 1rem;
    }
</style>
{% endblock %}
